.fg{margin-bottom:1.5rem;}
.fg label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:.6rem;}
.fg input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:.9rem 1.2rem;color:var(--text);font-family:var(--sans);font-size:1rem;outline:none;transition:border-color .2s;}

const BKEY='jstest_banned_v1';
function getBanned(){try{return JSON.parse(localStorage.getItem(BKEY)||'[]');}catch{return[];}}
function saveBanned(a){localStorage.setItem(BKEY,JSON.stringify(a));}

function LoginScreen({onLogin}){
  const [nm,setNm]=useState('');
  const [sn,setSn]=useState('');
  const [err,setErr]=useState('');
  const go=()=>{
    if(!nm.trim()||!sn.trim()){setErr('Ism va familiyangizni kiriting!');return;}
    const full=nm.trim()+' '+sn.trim();
    if(getBanned().includes(full.toLowerCase())){setErr('Siz avval ban qilingansiz. Administratorga murojaat qiling.');return;}
    onLogin(full);
  };
  return(
    <div className="login-screen">
      <div className="login-card">
        <div className="login-logo">
          <div className="logo-badge">JS/TS</div>
          <h1>Test Platformasi</h1>
          <p>JavaScript &amp; TypeScript bilimlarini sinab ko'ring</p>
        </div>
        <div className="fg"><label>Ismingiz</label><input value={nm} onChange={e=>setNm(e.target.value)} placeholder="Masalan: Alisher" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        <div className="fg"><label>Familiyangiz</label><input value={sn} onChange={e=>setSn(e.target.value)} placeholder="Masalan: Karimov" onKeyDown={e=>e.key==='Enter'&&go()}/></div>
        {err&&<p style={{color:'var(--danger)',fontSize:'.85rem',marginBottom:'1rem'}}>{err}</p>}
        <button className="btn-p" onClick={go}>Testni boshlash →</button>
        <p style={{textAlign:'center',marginTop:'1.2rem',fontSize:'.78rem',color:'var(--text2)'}}>⚠️ Alt+Tab, oyna almashtirish va yashirish kuzatiladi. 3 ta qoidabuzarlikdan keyin ban.</p>
      </div>
    </div>
  );
}

function BanScreen({userName,viols}){
  const lbl={'blur':'Oynadan chiqish (Alt+Tab)','visibilityHidden':'Sahifani yashirish (Win+M)'};
  return(
    <div className="ban-screen">
      <div className="ban-card">
        <div style={{fontSize:'4rem',marginBottom:'1.5rem'}}>🚫</div>
        <h2>Foydalanuvchi Bloklandi</h2>
        <p className="ban-name">{userName}</p>
        <p style={{marginTop:'.5rem'}}>Siz {viols.length} ta qoidabuzarlikka yo'l qo'ydingiz.</p>
        <div className="ban-viols">
          {viols.map((v,i)=><div key={i} className="vi"><span>⚠️</span><span>{i+1}. {lbl[v.type]||v.type} — savol #{v.q}</span></div>)}
        </div>
        <p style={{fontSize:'.82rem',marginTop:'1rem'}}>Administratorga murojaat qiling.</p>
        <button className="btn-w" style={{marginTop:'1.5rem'}} onClick={()=>{saveBanned(getBanned().filter(x=>x!==userName.toLowerCase()));window.location.reload();}}>Sahifani yangilash</button>
      </div>
    </div>
  );
}

function CheatWarn({count,type,onClose}){
  const isLast=count>=2;
  const msg={blur:"Siz boshqa oynaga o'tdingiz (Alt+Tab aniqlandi).",visibilityHidden:"Siz sahifani yashirdingiz yoki boshqa tabga o'tdingiz."};
  return(
    <div className="cheat-overlay">
      <div className={'cheat-popup'+(isLast?' last':'')}>
        <div className="warn-icon">{isLast?'🚨':'⚠️'}</div>
        <h3>{isLast?'OXIRGI OGOHLANTIRISH!':'Qoidabuzarlik aniqlandi!'}</h3>
        <p>{msg[type]||'Taqiqlangan amal aniqlandi.'}</p>
        <div className="cheat-cnt">{count} / 3</div>
        <p>{isLast?'Keyingi qoidabuzarlikda siz darhol BAN qilinasiz!':('Sizda yana '+(3-count)+' ta imkoniyat qoldi.')}</p>
        <button className="btn-w" onClick={onClose}>Tushundim, davom etaman</button>
      </div>
    </div>
  );
}

function TestApp({userName}){
  const [cur,setCur]=useState(0);
  const [ans,setAns]=useState({});
  const [done,setDone]=useState(false);
  const [cnt,setCnt]=useState(0);
  const [viols,setViols]=useState([]);
  const [showW,setShowW]=useState(false);
  const [wtype,setWtype]=useState('');
  const [banned,setBanned]=useState(false);
  const [t,setT]=useState(45*60);
  const tmr=useRef(null);
  const ref=useRef({count:0,viols:[],curQ:1});
  const lastB=useRef(0);
  const doneR=useRef(false);

  useEffect(()=>{
    if(done||banned)return;
    tmr.current=setInterval(()=>setT(v=>{if(v<=1){clearInterval(tmr.current);if(!doneR.current){doneR.current=true;setDone(true);}return 0;}return v-1;}),1000);
    return()=>clearInterval(tmr.current);
  },[done,banned]);

  const fmt=s=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');

  const reg=useCallback((type)=>{
    if(doneR.current)return;
    const now=Date.now();
    if(now-lastB.current<800)return;
    lastB.current=now;
    const nc=ref.current.count+1;
    const nv=[...ref.current.viols,{type,q:ref.current.curQ}];
    ref.current={...ref.current,count:nc,viols:nv};
    setCnt(nc);setViols(nv);setWtype(type);setShowW(true);
    if(nc>=3){saveBanned([...getBanned(),userName.toLowerCase()]);setShowW(false);setBanned(true);}
  },[userName]);

  useEffect(()=>{ref.current.curQ=cur+1;},[cur]);

  useEffect(()=>{
    const onBlur=()=>reg('blur');
    const onVis=()=>{if(document.hidden)reg('visibilityHidden');};
    window.addEventListener('blur',onBlur);
    document.addEventListener('visibilitychange',onVis);
    return()=>{window.removeEventListener('blur',onBlur);document.removeEventListener('visibilitychange',onVis);};
  },[reg]);

  const setA=(id,v)=>setAns(p=>({...p,[id]:v}));
  const submit=()=>{clearInterval(tmr.current);doneR.current=true;setDone(true);};

  if(banned)return <BanScreen userName={userName} viols={viols}/>;

  if(done){
    let mok=0,sok=0;
    QS.forEach(q=>{
      if(q.type==='mcq'&&ans[q.id]===q.answer)mok++;
      if(q.type==='short'&&ans[q.id]&&ans[q.id].trim().length>10)sok++;
    });
    const tot=QS.length,corr=mok+sok,pct=Math.round((corr/tot)*100);
    const grade=pct>=90?'A':pct>=75?'B':pct>=60?'C':pct>=45?'D':'F';
    const gc=pct>=75?'var(--success)':pct>=45?'var(--warn)':'var(--danger)';
    const circ=2*Math.PI*65;
    return(
      <div className="aw">
        <div style={{background:'var(--surface)',borderBottom:'1px solid var(--border)',padding:'1rem 2rem',display:'flex',alignItems:'center',gap:'1rem'}}>
          <span style={{fontFamily:'var(--mono)',color:'var(--accent)',fontWeight:700}}>JS/TS TEST</span>
          <span style={{color:'var(--text2)',fontSize:'.9rem'}}>{userName}</span>
        </div>
        <div className="rs">
          <div className="rh">
            <div className="sw">
              <svg style={{position:'absolute',inset:0,width:'100%',height:'100%'}} viewBox="0 0 140 140">
                <circle cx="70" cy="70" r="65" fill="none" stroke="var(--border)" strokeWidth="8"/>
                <circle cx="70" cy="70" r="65" fill="none" stroke={gc} strokeWidth="8"
                  strokeDasharray={(pct/100*circ).toFixed(1)+' '+circ.toFixed(1)}
                  strokeLinecap="round" transform="rotate(-90 70 70)"/>
              </svg>
              <div className="si"><div className="sn" style={{color:gc}}>{pct}%</div><div className="sl">{grade}</div></div>
            </div>
            <h2 style={{color:gc}}>{pct>=75?'🎉 Ajoyib!':pct>=50?'👍 Yaxshi!':'📚 Ko\'proq o\'qing!'}</h2>
            <p>{corr}/{tot} ta savol to'g'ri</p>
          </div>
          <div className="rstats">
            <div className="sc"><div className="sv" style={{color:'var(--success)'}}>{mok}/25</div><div className="slb">Variantli</div></div>
            <div className="sc"><div className="sv" style={{color:'var(--warn)'}}>{sok}/5</div><div className="slb">Qisqa javob</div></div>
            <div className="sc"><div className="sv" style={{color:'var(--danger)'}}>{cnt}/3</div><div className="slb">Ogohlantirishlar</div></div>
          </div>
          <div className="rvsec">
            <h3>Noto'g'ri variantli javoblar</h3>
            {QS.filter(q=>q.type==='mcq'&&ans[q.id]!==q.answer).map(q=>(
              <div key={q.id} className="ri">
                <div className="rq">#{q.id}. {q.text}</div>
                <div style={{fontSize:'.85rem',color:'var(--danger)',marginBottom:'.3rem'}}>Sizning javobingiz: {ans[q.id]!==undefined?q.options[ans[q.id]]:'(javob berilmagan)'}</div>
                <div style={{fontSize:'.85rem',color:'var(--success)'}}>To'g'ri javob: {q.options[q.answer]}</div>
              </div>
            ))}
            {QS.filter(q=>q.type==='mcq'&&ans[q.id]!==q.answer).length===0&&<p style={{color:'var(--success)',padding:'1rem 0'}}>✅ Barcha variantli savollar to'g'ri!</p>}
            <h3 style={{marginTop:'1.5rem'}}>Qisqa javoblar (namuna)</h3>
            {QS.filter(q=>q.type==='short').map(q=>(
              <div key={q.id} className="ri">
                <div className="rq">#{q.id}. {q.text}</div>
                <div style={{fontSize:'.85rem',color:'var(--text2)',marginBottom:'.4rem'}}>Sizning javobingiz: {ans[q.id]||'(javob berilmagan)'}</div>
                <div style={{fontSize:'.85rem',color:'var(--accent3)',borderTop:'1px solid var(--border)',paddingTop:'.4rem'}}>Namuna javob: {q.answer}</div>
              </div>
            ))}
          </div>
          <button className="btn-r" onClick={()=>window.location.reload()}>🔄 Qaytadan boshlash</button>
        </div>
      </div>
    );
  }

  const q=QS[cur];
  const tc=t<300?'td':t<600?'tw':'';
  const acnt=Object.keys(ans).length;
  return(
    <div className="aw">
      {showW&&!banned&&<CheatWarn count={cnt} type={wtype} onClose={()=>setShowW(false)}/>}
      <div className="test-header">
        <div className="hl">
          <span className="hlogo">JS/TS TEST</span>
          <span className="huser">Talaba: <span>{userName}</span></span>
        </div>
        <div className="hr">
          <div className={'cbadge'+(cnt>=2?' red':'')}>
            <div className={'cdot'+(cnt>=2?' r':'')}/>
            Ogohlantirishlar: {cnt}/3
          </div>
          <div className={'tbox '+tc}>⏱ {fmt(t)}</div>
        </div>
      </div>
      <div className="pw">
        <div className="pi"><span>Savol {cur+1} / {QS.length}</span><span>Javob berildi: {acnt}/{QS.length}</span></div>
        <div className="pt"><div className="pf" style={{width:((cur+1)/QS.length*100)+'%'}}/></div>
      </div>
      <div className="tb">
        {(cur===0||cur===25)&&<div className="slabel">{cur===0?'📋 Variantli savollar (1–25)':'✍️ Qisqa javob savollar (26–30)'}</div>}
        <div className="qcard">
          <div className="qnum">#{q.id} • {q.topic}</div>
          <div className="qtext">{q.text}</div>
          {q.code&&<pre className="qcode">{q.code}</pre>}
          {q.type==='mcq'?(
            <ul className="opts">
              {q.options.map((o,i)=>(
                <li key={i} className={'opt'+(ans[q.id]===i?' sel':'')} onClick={()=>setA(q.id,i)}>
                  <span className="oltr">{String.fromCharCode(65+i)}</span>
                  <span>{o}</span>
                </li>
              ))}
            </ul>
          ):(
            <textarea className="sinp" placeholder={q.placeholder} value={ans[q.id]||''} onChange={e=>setA(q.id,e.target.value)} rows={4}/>
          )}
        </div>
      </div>
      <div className="tnav">
        <div className="ndots">
          {QS.map((qq,i)=>(
            <div key={i} className={'nd'+(qq.type==='short'?' stp':'')+(i===cur?' cur':ans[qq.id]!==undefined?' ans':'')} onClick={()=>setCur(i)} title={'Savol '+(i+1)}/>
          ))}
        </div>
        <div className="nacts">
          {cur>0&&<button className="btn-n" onClick={()=>setCur(c=>c-1)}>← Oldingi</button>}
          {cur<QS.length-1?<button className="btn-n" onClick={()=>setCur(c=>c+1)}>Keyingi →</button>:<button className="btn-s" onClick={submit}>✓ Testni yakunlash</button>}
        </div>
      </div>
    </div>
  );
}

function App(){
  const [u,setU]=useState(null);
  return u?<TestApp userName={u}/>:<LoginScreen onLogin={setU}/>;
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
